name: Public DAO API CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
        working-directory: public-dao-api
      - name: Build Docker image
        run: docker build -t public-dao-api ./public-dao-api
      - name: Run tests
        run: npm run test
        working-directory: public-dao-api
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Docker image
        run: |
          docker tag public-dao-api mlallai/public-dao-api:latest
          docker push mlallai/public-dao-api:latest
